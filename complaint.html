<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File a Complaint - Regarding Municipal Corporation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .complaint-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #3498db;
            transform: translateX(-5px);
        }

        .back-link i {
            margin-right: 8px;
        }

        #complaint-root {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Complaint Form Styles */
        .complaint-form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .complaint-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .complaint-header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .complaint-header p {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin: 0;
        }

        .complaint-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .complaint-page-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            align-items: start;
        }

        .past-complaints-section,
        .new-complaint-section {
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid #edf2f7;
        }

        .section-heading {
            margin-bottom: 24px;
        }

        .section-heading h2 {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .section-heading p {
            color: #6b7280;
            margin: 0;
            font-size: 0.95rem;
        }

        .complaint-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .complaint-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 18px 20px;
            background: #f9fafb;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .complaint-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        }

        .complaint-card.expanded {
            background: #ffffff;
            border-color: #60a5fa;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #1f2937;
        }

        .card-subject,
        .card-location,
        .card-meta {
            margin: 6px 0 0;
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .card-meta {
            color: #64748b;
            font-size: 0.85rem;
        }

        .card-details {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #e2e8f0;
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .card-details p {
            margin: 0 0 10px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #f5d191;
        }

        .badge-progress {
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #93c5fd;
        }

        .badge-resolved {
            background: #d1fae5;
            color: #14532d;
            border: 1px solid #86efac;
        }

        .empty-state-card {
            border: 2px dashed #cbd5e1;
            background: #f8fafc;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            color: #475569;
            line-height: 1.7;
        }

        .complaint-form-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
        }

        .complaint-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .complaint-header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .complaint-header p {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin: 0;
        }

        .complaint-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
        }

        .btn-primary,
        .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
        }

        .btn-secondary:hover {
            background: #d5dbdb;
            border-color: #95a5a6;
        }

        /* Success Message Styles */
        .complaint-success {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            line-height: 80px;
            font-weight: bold;
        }

        .complaint-success h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .complaint-success p {
            font-size: 1.1rem;
            margin: 10px 0;
            opacity: 0.9;
        }

        /* Image Upload Styles */
        .image-upload-section {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .image-upload-section:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .image-upload-section.dragover {
            border-color: #27ae60;
            background: #d5f4e6;
        }

        .upload-icon {
            font-size: 3rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .image-upload-section p {
            margin: 10px 0;
            color: #7f8c8d;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .upload-btn:hover {
            background: #2980b9;
        }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .image-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e1e8ed;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-image {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Location Detection Styles */
        .location-section {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .location-section input {
            flex: 1;
            min-width: 250px;
        }

        .location-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 220px;
            transition: all 0.3s ease;
        }

        .location-meta {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #34495e;
            line-height: 1.4;
        }

        .location-btn:hover {
            background: #2ecc71;
            transform: translateY(-1px);
        }

        .location-btn.loading {
            background: #f39c12;
            cursor: not-allowed;
        }

        .location-btn i {
            font-size: 1rem;
        }

        .location-status {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #27ae60;
        }

        .location-error {
            color: #e74c3c;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .complaint-page-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .complaint-form-container {
                margin: 10px;
                padding: 15px;
            }

            .complaint-header h1 {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }

            .location-section {
                flex-direction: column;
                gap: 15px;
            }

            .image-preview {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    

    <script src="ComplaintForm-Plain.js"></script>
    <script src="script.js"></script>
</body>
</html>
